<!DOCTYPE html>
<html>            
<head>
    <title>All Msg Data</title>
    <style>
        .debug {
            color: blue;
        }
        .info {
            color: green;
        }
        .success {
            color: orange;
        }
        .warning {
            color: yellow;
        }
        .error {
            color: red;
        }
        ul{
            list-style-type: none;
        }
    </style>
</head>
<body>
    <h1> All Msg Data</h1>
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li class ={{ message.tags }}>{{ message }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No messages.</p>
    {% endif %}
</body>
</html>
