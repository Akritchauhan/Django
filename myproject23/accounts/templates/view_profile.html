{% extends "base.html" %}
{% block content %}
<h2>View Profile</h2>

<ul>
    {% for profile in profiles %}
        <li>
            {{profile.name}}<br>
            <img src="{{ profile.profile_picture.url }}" alt="{{ profile.name }}" width="200">
        </li>
    {% endfor %}
 </ul>
{% endblock %}
