<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Students Data</title>
</head>
<body>

    <h2>All Students Data</h2>
    <a href="{% url 'student_create' %}">Add New Student</a>
    <ul>
        {% for student in students %}
            <li>
                <a href="{% url 'student_detail' student.pk %}">{{ student.name }} - {{ student.age }} - {{ student.email }}</a>|
                <a href="{% url 'student_update' student.pk %}">Edit</a> | 
                <a href="{% url 'student_delete' student.pk %}">Delete</a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
