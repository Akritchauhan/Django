{% extends 'base.html' %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <p>{{ post.content }}</p>
    <a href="{% url 'post_update' post.pk %}" class="btn btn-primary">Edit</a>
    <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Delete</a>
    <a href="{% url 'post_list' %}" class="btn btn-secondary">Back to List</a>
{% endblock %}
